<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中铁建孔艳 · 个人主页</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
background:#000;
color:#fff;
}

.bg{
position:fixed;
inset:0;
z-index:-1;
background:
radial-gradient(circle at 20% 20%,#2563eb,transparent 35%),
radial-gradient(circle at 80% 30%,#9333ea,transparent 35%),
radial-gradient(circle at 50% 80%,#06b6d4,transparent 40%);
filter:blur(120px);
animation:bgMove 15s infinite alternate ease-in-out;
}

@keyframes bgMove{
from{transform:scale(1);}
to{transform:scale(1.3) rotate(10deg);}
}

.card{
width:100%;
max-width:420px;
padding:35px;
border-radius:32px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 20px 60px rgba(0,0,0,.45);
text-align:center;
}

.avatar{
width:130px;
height:130px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:70px;
background:rgba(255,255,255,.08);
border:3px solid rgba(255,255,255,.2);
animation:float 3s ease-in-out infinite;
}

@keyframes float{
50%{
transform:translateY(-8px);
}
}

.name{
margin-top:18px;
font-size:34px;
font-weight:700;
}

.job{
margin-top:8px;
color:#d1d5db;
}

.desc{
margin-top:15px;
line-height:1.8;
color:#e5e7eb;
}

.btns{
margin-top:28px;
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
padding:16px;
border:none;
border-radius:18px;
background:rgba(255,255,255,.1);
color:#fff;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.18);
}

.footer{
margin-top:25px;
font-size:12px;
color:#94a3b8;
}

/* 弹窗 */

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
backdrop-filter:blur(8px);
}

.popup-box{
width:320px;
max-width:90%;
padding:25px;
border-radius:24px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
text-align:center;
}

.popup-box h2{
margin-bottom:15px;
}

.popup-content{
margin:18px 0;
line-height:1.8;
}

.popup-actions{
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.action-btn{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
}

.close-btn{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:12px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="avatar">👩</div>

<div class="name">孔艳</div>

<div class="job">个人主页</div>

<div class="desc">
欢迎来到我的个人主页。<br>
感谢您的访问，希望与您建立联系。
</div>

<div class="btns">

<button class="btn" onclick="showWechat()">
📱 微信联系
</button>

<button class="btn" onclick="showPhone()">
📞 手机联系
</button>

<button class="btn" onclick="showEmail()">
📧 邮箱联系
</button>

<button class="btn" onclick="showAbout()">
👤 关于我
</button>

</div>

<div class="footer">
© 2026 孔艳 Personal Website
</div>

</div>

<script>

function closePopup(){
const popup=document.querySelector('.popup');
if(popup) popup.remove();
}

function createPopup(title,content){

closePopup();

const popup=document.createElement('div');

popup.className='popup';

popup.innerHTML=`
<div class="popup-box">

<h2>${title}</h2>

<div class="popup-content">
${content}
</div>

<button class="close-btn" onclick="closePopup()">
关闭
</button>

</div>
`;

document.body.appendChild(popup);
}

function copyText(text){

navigator.clipboard.writeText(text);

alert("已复制：" + text);
}

/* 微信 */

function showWechat(){

createPopup(
"微信联系",
`
<div style="font-size:22px;font-weight:bold;">
13915520807
</div>

<div class="popup-actions">
<button class="action-btn"
onclick="copyText('13915520807')">
复制微信号
</button>
</div>
`
);

}

/* 手机 */

function showPhone(){

createPopup(
"手机联系",
`
<div style="font-size:22px;font-weight:bold;">
13915520807
</div>

<div class="popup-actions">

<button class="action-btn"
onclick="copyText('13915520807')">
复制号码
</button>

<button class="action-btn"
onclick="window.location.href='tel:13915520807'">
立即拨打
</button>

</div>
`
);

}

/* 邮箱 */

function showEmail(){

createPopup(
"电子邮箱",
`
<div style="font-size:18px;">
123456789@qq.com
</div>

<div class="popup-actions">

<button class="action-btn"
onclick="copyText('123456789@qq.com')">
复制邮箱
</button>

<button class="action-btn"
onclick="window.location.href='mailto:123456789@qq.com'">
发送邮件
</button>

</div>
`
);

}

/* 关于我 */

function showAbout(){

createPopup(
"关于我",
`
你好，我是中铁建孔艳。<br><br>
欢迎通过微信、电话或邮箱与我联系。<br>
期待认识更多朋友。
`
);

}

</script>

</body>
</html>
